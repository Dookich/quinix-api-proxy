<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUINIX — Iniciar sesión</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --qx-green:#1DB954;--qx-green-light:#7ED957;--qx-gold:#F5C518;
  --qx-blue:#1A3FA8;--qx-purple:#8B5CF6;
  --qx-bg:#0B1529;--qx-card:#132040;--qx-card2:#1A2D55;
  --qx-text:#F0F4FF;--qx-muted:#8A9FCC;--qx-border:rgba(255,255,255,0.1);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--qx-bg);color:var(--qx-text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.bg-deco{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.bg-circle{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;}
.bg-c1{width:400px;height:400px;background:var(--qx-blue);top:-100px;right:-100px;}
.bg-c2{width:300px;height:300px;background:var(--qx-green);bottom:-80px;left:-80px;}
.card{background:var(--qx-card);border:1px solid var(--qx-border);border-radius:20px;padding:2rem;width:100%;max-width:420px;position:relative;z-index:10;}
.logo{font-size:22px;font-weight:900;letter-spacing:1px;text-align:center;margin-bottom:1.5rem;text-decoration:none;display:block;color:var(--qx-text);}
.logo span{color:var(--qx-green-light);}
.card-title{font-size:20px;font-weight:800;margin-bottom:.5rem;}
.card-sub{font-size:13px;color:var(--qx-muted);margin-bottom:1.5rem;line-height:1.5;}
.form-group{margin-bottom:1rem;}
.form-label{font-size:11px;font-weight:700;color:var(--qx-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--qx-bg);border:1px solid var(--qx-border);border-radius:9px;padding:11px 14px;color:var(--qx-text);font-size:14px;outline:none;font-family:inherit;transition:border .2s;}
.form-input:focus{border-color:var(--qx-green);}
.form-input::placeholder{color:var(--qx-muted);opacity:.6;}
.btn-primary{width:100%;padding:13px;background:var(--qx-green);color:#0B1529;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:.5rem;transition:all .2s;}
.btn-primary:hover{background:var(--qx-green-light);}
.btn-primary:disabled{opacity:.4;cursor:default;}
.error-msg{font-size:12px;color:#ff6b6b;margin-top:8px;display:none;background:rgba(214,40,40,.1);border:1px solid rgba(214,40,40,.2);border-radius:8px;padding:8px 12px;}
.error-msg.show{display:block;}
.divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0;font-size:12px;color:var(--qx-muted);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--qx-border);}
.link-row{text-align:center;font-size:13px;color:var(--qx-muted);margin-top:1rem;}
.link-row a{color:var(--qx-green);text-decoration:none;font-weight:600;}
.link-row a:hover{text-decoration:underline;}
.loading{opacity:.7;cursor:default;}
</style>
</head>
<body>
<div class="bg-deco">
  <div class="bg-circle bg-c1"></div>
  <div class="bg-circle bg-c2"></div>
</div>

<div class="card">
  <a href="index.html" class="logo">QUINI<span>X</span></a>
  <div class="card-title">Bienvenido de vuelta</div>
  <div class="card-sub">Ingresa tus datos para acceder a tu cuenta.</div>

  <div class="form-group">
    <label class="form-label">Correo electrónico</label>
    <input class="form-input" id="email" type="email" placeholder="tu@correo.com">
  </div>
  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <input class="form-input" id="password" type="password" placeholder="Tu contraseña" onkeydown="if(event.key==='Enter')handleLogin()">
  </div>

  <div class="error-msg" id="errorMsg"></div>

<button class="btn-primary" id="btnLogin">Entrar a QUINIX</button>
  <div class="divider">o</div>

  <div class="link-row">
    ¿No tienes cuenta? <a href="onboarding.html">Regístrate gratis</a>
  </div>
</div>
document.getElementById('btnLogin').addEventListener('click', handleLogin);
<script>
// Si ya hay sesión, ir al dashboard
if(localStorage.getItem('quinix_session')){
  window.location.href = 'dashboard.html';
}

  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;

    errEl.classList.add('show');
    return;
  }

  btn.classList.add('loading');
  errEl.classList.remove('show');
